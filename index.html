<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Your Free Gift - Pulsz</title>
    <style>
        body { margin:0; padding:0; background: linear-gradient(135deg, #1a0033, #330066); color:white; font-family:Arial, sans-serif; text-align:center; }
        .container { max-width: 480px; margin: 40px auto; padding: 20px; }
        h1 { font-size: 28px; margin: 20px 0; }
        p { font-size: 18px; line-height: 1.5; }
        input { width: 100%; padding: 15px; margin: 15px 0; border: none; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 18px; background: #00ff88; color: #000; font-size: 20px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        button:hover { background: #00cc6e; }
        .disclaimer { font-size: 12px; opacity: 0.7; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎁 Your Free Gift is Ready at Pulsz!</h1>
        <p>RealPrize users are getting <strong>massive welcome bonuses</strong> right now.</p>
        <p>Enter your email to claim $9.99 starter pack + extra coins instantly.</p>
        
        <input type="email" id="email" placeholder="Enter your email address" required>
        <button onclick="claimGift()">Claim Free Gift Now</button>
        
        <p style="margin-top:25px; font-size:16px;">✅ Instant access • No spam ever</p>
        
        <div class="disclaimer">
            By continuing you agree to receive bonus offers. Pulsz Casino.
        </div>
    </div>

    <script>
        function claimGift() {
            const email = document.getElementById('email').value.trim();
            if (!email || !email.includes('@')) {
                alert("Please enter a valid email");
                return;
            }

            fetch('save.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, source: 'realprize' })
            }).catch(() => {});

            setTimeout(() => {
                window.location.href = "https://www.pulsz.com/?invited_by=j4g3rc";
            }, 800);
        }

        window.onload = () => document.getElementById('email').focus();
    </script>
</body>
</html>
